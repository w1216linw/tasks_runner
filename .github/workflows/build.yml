name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: TaskRunner-windows
          - os: macos-latest
            artifact: TaskRunner-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: nicegui-pack --onedir --name TaskRunner --add-data "scripts;scripts" main.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: nicegui-pack --onedir --name TaskRunner --add-data "scripts:scripts" main.py

      - name: Add macOS launch script
        if: runner.os == 'macOS'
        run: |
          cat > dist/TaskRunner/启动（首次运行前执行）.command << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          xattr -cr "$DIR"
          open "$DIR/TaskRunner"
          EOF
          chmod +x "dist/TaskRunner/启动（首次运行前执行）.command"

      - name: Zip output
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a ../TaskRunner-windows.zip TaskRunner/
          else
            zip -r ../TaskRunner-macos.zip TaskRunner/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TaskRunner-windows/TaskRunner-windows.zip
            TaskRunner-macos/TaskRunner-macos.zip
